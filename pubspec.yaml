name: shiksha_darpan
description: A comprehensive education monitoring system for India.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  fl_chart: ^0.66.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  firebase_core: ^4.9.0
  cloud_firestore: ^6.4.1
  firebase_auth: ^6.5.1
  google_sign_in: ^6.2.1
  firebase_storage: ^12.3.6
  intl: ^0.19.0
  pdf: ^3.11.1
  printing: ^5.13.2
  qr_flutter: ^4.1.0
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  share_plus: ^10.0.3
  path_provider: ^2.1.4
  uuid: ^4.4.2
  table_calendar: ^3.1.2
  percent_indicator: ^4.2.3
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
